<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDET League · Tablero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --stage-0:#0A0916; --stage-1:#14102A; --stage-2:#1E1840;
    --ink:#F3EFFF; --muted:#948CC0; --line:rgba(155,145,220,.16);
    --gold:#FFD86B;   --gold-edge:#B8860B; --gold-glow:rgba(255,205,90,.45);
    --silver:#DDE5F2; --silver-edge:#8B96A8;
    --bronze:#E4975A; --bronze-edge:#A85C2E;
    --accent:#FF3E9A; --accent-soft:rgba(255,62,154,.14);
    --disp:'Bricolage Grotesque',system-ui,sans-serif;
    --util:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--util);color:var(--ink);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(120% 90% at 50% -10%, rgba(255,62,154,.10), transparent 55%),
      radial-gradient(120% 120% at 50% 0%, rgba(255,216,107,.09), transparent 45%),
      radial-gradient(100% 100% at 50% 120%, #060510, transparent 60%),
      var(--stage-0);}
  .orb{position:fixed;border-radius:50%;filter:blur(70px);opacity:.5;z-index:0;pointer-events:none;animation:drift 22s ease-in-out infinite}
  .orb.a{width:420px;height:420px;background:rgba(255,62,154,.22);top:-120px;left:-80px}
  .orb.b{width:380px;height:380px;background:rgba(124,90,255,.22);bottom:-120px;right:-80px;animation-delay:-8s}
  @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}

  .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 22px 44px;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;font-weight:600;letter-spacing:.22em;
    text-transform:uppercase;color:var(--accent);background:var(--accent-soft);border:1px solid rgba(255,62,154,.3);padding:6px 12px;border-radius:100px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,62,154,.6)}70%{box-shadow:0 0 0 9px rgba(255,62,154,0)}100%{box-shadow:0 0 0 0 rgba(255,62,154,0)}}
  h1{font-family:var(--disp);font-weight:800;font-size:clamp(2.4rem,6.2vw,4.4rem);line-height:.92;letter-spacing:-.02em;margin-top:10px}
  h1 .lg{color:transparent;-webkit-text-stroke:1.5px var(--gold);text-shadow:0 0 30px var(--gold-glow)}

  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .status{display:inline-flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);padding:8px 12px;
    border:1px solid var(--line);border-radius:100px;background:rgba(255,255,255,.02)}
  .status .live{width:7px;height:7px;border-radius:50%;background:#43e08a;box-shadow:0 0 8px #43e08a}
  .status.err .live{background:#ff5a5a;box-shadow:0 0 8px #ff5a5a}
  button{font-family:var(--util);font-weight:600;font-size:.82rem;color:var(--ink);cursor:pointer;
    background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:100px;padding:9px 16px;transition:.18s ease}
  button:hover{background:rgba(255,255,255,.09);border-color:rgba(155,145,220,.35)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* segmented tabs */
  .tabs{display:inline-flex;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:100px;padding:4px;margin:22px auto 0}
  .tab{border:none;background:transparent;border-radius:100px;padding:9px 22px}
  .tab.active{background:var(--accent-soft);color:#ffd0e6;box-shadow:inset 0 0 0 1px rgba(255,62,154,.4)}

  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;padding-top:8px}
  .view{display:none}.view.active{display:block}

  /* ---- Podio ---- */
  .spot{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:min(560px,80%);height:55%;
    background:radial-gradient(60% 100% at 50% 0%, rgba(255,216,107,.16), transparent 70%);pointer-events:none;z-index:0}
  .podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;align-items:end;gap:clamp(10px,2.6vw,30px);
    position:relative;z-index:1;max-width:920px;margin:24px auto 0;width:100%}
  .col{display:flex;flex-direction:column;align-items:center}
  .teams{display:flex;flex-direction:column;gap:8px;width:100%;align-items:center;margin-bottom:16px}
  .chip{width:100%;max-width:250px;text-align:center;border-radius:14px;padding:11px 12px;
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02));border:1px solid var(--line);
    backdrop-filter:blur(6px);animation:rise .55s cubic-bezier(.2,.8,.25,1) both}
  .chip .name{font-family:var(--disp);font-weight:700;font-size:clamp(.95rem,1.9vw,1.15rem);line-height:1.1}
  .chip .pts{margin-top:3px;font-weight:700;font-size:.82rem;color:var(--muted);font-feature-settings:"tnum" 1}
  .chip .pts b{color:var(--ink);font-size:1.05rem}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .gold .chip{border-color:rgba(255,216,107,.55);box-shadow:0 0 34px var(--gold-glow)} .gold .chip .name{color:var(--gold)}
  .silver .chip{border-color:rgba(221,229,242,.4)} .silver .chip .name{color:var(--silver)}
  .bronze .chip{border-color:rgba(228,151,90,.42)} .bronze .chip .name{color:var(--bronze)}
  .empty-chip{width:100%;max-width:250px;text-align:center;border-radius:14px;padding:14px 12px;border:1px dashed var(--line);color:var(--muted);font-size:.82rem}
  .medal{width:clamp(40px,7vw,54px);height:clamp(40px,7vw,54px);border-radius:50%;display:grid;place-items:center;
    font-size:clamp(1.2rem,3vw,1.6rem);margin-bottom:-14px;position:relative;z-index:2;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .gold .medal{background:radial-gradient(circle at 35% 30%,#fff2c2,var(--gold) 55%,var(--gold-edge))}
  .silver .medal{background:radial-gradient(circle at 35% 30%,#fff,var(--silver) 55%,var(--silver-edge))}
  .bronze .medal{background:radial-gradient(circle at 35% 30%,#ffd9b8,var(--bronze) 55%,var(--bronze-edge))}
  .pedestal{width:100%;border-radius:14px 14px 6px 6px;display:flex;align-items:flex-start;justify-content:center;padding-top:24px;
    border:1px solid rgba(255,255,255,.08);border-bottom:none;animation:grow .6s cubic-bezier(.2,.8,.25,1) both}
  .gold .pedestal{height:clamp(150px,26vw,230px);background:linear-gradient(180deg,rgba(255,216,107,.30),rgba(255,216,107,.06) 60%,transparent)}
  .silver .pedestal{height:clamp(110px,20vw,168px);background:linear-gradient(180deg,rgba(221,229,242,.24),rgba(221,229,242,.05) 60%,transparent)}
  .bronze .pedestal{height:clamp(84px,15vw,124px);background:linear-gradient(180deg,rgba(228,151,90,.24),rgba(228,151,90,.05) 60%,transparent)}
  @keyframes grow{from{opacity:0;transform:scaleY(.7);transform-origin:bottom}to{opacity:1;transform:scaleY(1)}}
  .pedestal .rank{font-family:var(--disp);font-weight:800;font-size:clamp(2.2rem,6vw,3.6rem);line-height:1;opacity:.9}
  .gold .rank{color:var(--gold)} .silver .rank{color:var(--silver)} .bronze .rank{color:var(--bronze)}

  /* ---- Por misión ---- */
  .board{margin:24px auto 0;max-width:100%;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.02)}
  .scrollx{overflow-x:auto}
  table{border-collapse:collapse;width:100%;min-width:520px}
  th,td{padding:14px 14px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--line)}
  thead th{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;
    background:var(--stage-1);position:sticky;top:0}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:rgba(255,255,255,.03)}
  .c-pos{width:56px;font-family:var(--disp);font-weight:800;font-size:1.1rem;color:var(--muted)}
  .c-team{text-align:left;font-weight:600;position:sticky;left:0;background:var(--stage-0);z-index:1}
  thead .c-team{background:var(--stage-1)}
  .c-num{font-feature-settings:"tnum" 1;font-weight:500;color:var(--ink)}
  .c-num.blank{color:rgba(148,140,192,.5)}
  .c-num.lead{color:var(--gold);font-weight:700}
  .c-total{font-family:var(--disp);font-weight:800;font-size:1.15rem;background:rgba(255,216,107,.06)}
  thead .c-total{color:var(--gold);background:rgba(255,216,107,.08)}
  tr.t1 .c-pos{color:var(--gold)} tr.t2 .c-pos{color:var(--silver)} tr.t3 .c-pos{color:var(--bronze)}
  .c-pos .m{font-size:.9rem}

  /* mensajes */
  .msg{text-align:center;margin:0 auto;max-width:520px;padding:44px 20px}
  .msg .big{font-family:var(--disp);font-weight:700;font-size:clamp(1.4rem,4vw,2rem);margin-bottom:10px}
  .msg p{color:var(--muted);line-height:1.5}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  footer{margin-top:26px;text-align:center;color:var(--muted);font-size:.78rem}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="orb a"></div><div class="orb b"></div>
  <div class="wrap">
    <header>
      <div>
        <span class="eyebrow"><span class="dot"></span>Tablero en vivo</span>
        <h1>EDET <span class="lg">LEAGUE</span></h1>
      </div>
      <div class="controls">
        <span class="status" id="status"><span class="live"></span><span id="statusText">Cargando…</span></span>
        <button id="refreshBtn">Actualizar</button>
      </div>
    </header>

    <div style="display:flex;justify-content:center">
      <div class="tabs">
        <button class="tab" data-v="podio">Podio</button>
        <button class="tab active" data-v="mision">Por misión</button>
      </div>
    </div>

    <main class="stage">
      <div class="view" id="podioView">
        <div class="spot"></div>
        <div id="podioBody"><div class="msg"><div class="spinner"></div><p>Trayendo resultados…</p></div></div>
      </div>
      <div class="view active" id="misionView">
        <div id="misionBody"><div class="msg"><div class="spinner"></div><p>Trayendo resultados…</p></div></div>
      </div>
    </main>

    <footer><span id="foot">Se actualiza automáticamente durante la semana</span></footer>
  </div>

<script>
  // ==== Configuración ====
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRhFsgV30nLjx_0JTvX4Ck1n4GaEGa0_KHiXgY4I5096t3DR2ChMll7rfOxk1BY-ceXdRF7wV8MRQm/pub?gid=1711918922&single=true&output=csv";
  const REFRESH_MS = 60000;
  // =======================

  const MEDALS=["🥇","🥈","🥉"], TIER=["gold","silver","bronze"];
  let lastData=null, activeView="mision";

  function parseCSV(text){
    const rows=[]; let row=[],field="",q=false;
    for(let i=0;i<text.length;i++){const c=text[i];
      if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=c; }
      else{ if(c==='"')q=true; else if(c===','){row.push(field);field="";}
        else if(c==='\n'){row.push(field);rows.push(row);row=[];field="";}
        else if(c==='\r'){} else field+=c; } }
    if(field.length||row.length){row.push(field);rows.push(row);}
    return rows;
  }

  function num(v){ const n=parseFloat((v||"").toString().replace(/[^\d.,-]/g,"").replace(",",".")); return isNaN(n)?null:n; }
  function fmt(n){ return Number.isInteger(n)?n:n.toFixed(1); }
  function esc(s){ return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function extractData(rows){
    if(!rows.length) return {teams:[],missions:[]};
    const header=rows[0].map(h=>(h||"").trim());
    let totalIdx=header.findIndex(h=>/puntaje/i.test(h)&&/total/i.test(h));
    if(totalIdx<0) totalIdx=header.findIndex(h=>/puntaje/i.test(h));
    if(totalIdx<0) totalIdx=header.findIndex(h=>/total/i.test(h));
    const rankIdx=header.findIndex(h=>/ranking/i.test(h));
    const missionIdx=[];
    header.forEach((h,i)=>{ if(i===0||i===totalIdx||i===rankIdx||!h) return;
      if(/puntaje|ranking/i.test(h)) return; missionIdx.push(i); });
    const teams=[];
    for(let r=1;r<rows.length;r++){
      const cells=rows[r]; const name=(cells[0]||"").trim();
      if(!name||/^(total|ranking|puntaje)/i.test(name)) continue;
      const missions={}; missionIdx.forEach(i=>{ missions[header[i]]=(cells[i]||"").trim(); });
      let total; if(totalIdx>=0){ const n=num(cells[totalIdx]); total=n===null?0:n; }
      else total=missionIdx.reduce((s,i)=>s+(num(cells[i])||0),0);
      teams.push({name,missions,total,score:total});
    }
    const inPlay=missionIdx.map(i=>header[i]).filter(name=>teams.some(t=>t.missions[name]!==""));
    return {teams,missions:inPlay};
  }

  function rankTeams(teams){
    const s=[...teams].sort((a,b)=>b.score-a.score);
    let pos=0,prev=null; s.forEach(t=>{ if(t.score!==prev){pos++;prev=t.score;} t.pos=pos; });
    return s;
  }

  function renderPodium(teams){
    const el=document.getElementById("podioBody");
    const maxScore=teams.reduce((m,t)=>Math.max(m,t.score),0);
    if(!teams.length){ el.innerHTML=`<div class="msg"><div class="big">Sin equipos todavía</div><p>Cuando la planilla tenga equipos, el podio aparece acá.</p></div>`; return; }
    if(maxScore<=0){ el.innerHTML=`<div class="msg"><div class="big">El podio se define esta semana</div><p>Todos arrancan en cero. Con cada misión resuelta, las posiciones se arman en vivo.</p></div>`; return; }
    const ranked=rankTeams(teams), byTier={1:[],2:[],3:[]};
    ranked.forEach(t=>{ if(t.pos<=3) byTier[t.pos].push(t); });
    let html='<div class="podium">';
    [2,1,3].forEach(p=>{
      const cls=TIER[p-1], list=byTier[p]; let chips="";
      if(list.length) list.forEach((t,i)=>{ chips+=`<div class="chip" style="animation-delay:${i*0.06}s"><div class="name">${esc(t.name)}</div><div class="pts"><b>${fmt(t.score)}</b> pts</div></div>`; });
      else chips=`<div class="empty-chip">Por definirse</div>`;
      html+=`<div class="col ${cls}"><div class="teams">${chips}</div><div class="medal">${MEDALS[p-1]}</div><div class="pedestal"><span class="rank">${p}</span></div></div>`;
    });
    el.innerHTML=html+'</div>';
  }

  function renderMissions(teams,missions){
    const el=document.getElementById("misionBody");
    if(!teams.length){ el.innerHTML=`<div class="msg"><div class="big">Sin equipos todavía</div><p>Cargá los equipos en la planilla para ver el detalle.</p></div>`; return; }
    if(!missions.length){ el.innerHTML=`<div class="msg"><div class="big">Todavía no se jugó ninguna misión</div><p>Apenas cargues puntajes de la primera misión, la columna aparece acá sola.</p></div>`; return; }
    const ranked=rankTeams(teams);
    // máximo por misión y total (para destacar al líder de cada misión)
    const maxBy={}; missions.forEach(m=>{ maxBy[m]=Math.max(...teams.map(t=>num(t.missions[m])||0)); });
    const maxTotal=Math.max(...teams.map(t=>t.total));
    let head=`<tr><th class="c-pos">#</th><th class="c-team">Equipo</th>`;
    missions.forEach(m=>{ head+=`<th>${esc(m)}</th>`; });
    head+=`<th class="c-total">Total</th></tr>`;
    let body="";
    ranked.forEach(t=>{
      const tc=t.pos<=3?"t"+t.pos:"";
      const medal=t.pos<=3?`<span class="m">${MEDALS[t.pos-1]}</span>`:t.pos;
      let cells="";
      missions.forEach(m=>{
        const v=t.missions[m], n=num(v);
        const blank=(v===""||v==null);
        const lead=(n!=null&&maxBy[m]>0&&n===maxBy[m]);
        cells+=`<td class="c-num ${blank?'blank':''} ${lead?'lead':''}">${blank?'·':esc(v)}</td>`;
      });
      const totLead=t.total===maxTotal&&maxTotal>0?'lead':'';
      body+=`<tr class="${tc}"><td class="c-pos">${medal}</td><td class="c-team">${esc(t.name)}</td>${cells}<td class="c-total ${totLead}">${fmt(t.total)}</td></tr>`;
    });
    el.innerHTML=`<div class="board"><div class="scrollx"><table><thead>${head}</thead><tbody>${body}</tbody></table></div></div>`;
  }

  function setStatus(state,text){
    const el=document.getElementById("status");
    el.className="status"+(state==="err"?" err":"");
    document.getElementById("statusText").textContent=text;
  }

  async function load(){
    try{
      const url=CSV_URL+(CSV_URL.includes("?")?"&":"?")+"cb="+Date.now();
      const res=await fetch(url,{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const data=extractData(parseCSV(await res.text()));
      lastData=data;
      renderPodium(data.teams);
      renderMissions(data.teams,data.missions);
      const now=new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
      setStatus("live","En vivo · "+now);
      document.getElementById("foot").textContent="Última actualización "+now+" · se refresca cada minuto";
    }catch(e){
      setStatus("err","Sin conexión");
      if(!lastData){
        const m=`<div class="msg"><div class="big">No pude leer la planilla</div><p>Verificá que siga publicada en la web (Archivo → Compartir → Publicar en la web) y reintentá con Actualizar.</p></div>`;
        document.getElementById("podioBody").innerHTML=m;
        document.getElementById("misionBody").innerHTML=m;
      }
    }
  }

  document.getElementById("refreshBtn").addEventListener("click",load);
  document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>{
    activeView=b.dataset.v;
    document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===b));
    document.getElementById("podioView").classList.toggle("active",activeView==="podio");
    document.getElementById("misionView").classList.toggle("active",activeView==="mision");
  }));

  load();
  setInterval(load,REFRESH_MS);
</script>
</body>
</html>
